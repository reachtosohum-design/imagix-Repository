<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMAGIX Repository</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
overflow:hidden;
text-align:center;
}

/* SLIDESHOW BACKGROUND */

.slideshow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:slideShow 12s infinite;
}

.slideshow img:nth-child(1){animation-delay:0s}
.slideshow img:nth-child(2){animation-delay:3s}
.slideshow img:nth-child(3){animation-delay:6s}
.slideshow img:nth-child(4){animation-delay:9s}

@keyframes slideShow{
0%{opacity:0}
8%{opacity:1}
25%{opacity:1}
33%{opacity:0}
100%{opacity:0}
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-2;
}

/* FLOATING PARTICLES */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.particles span{
position:absolute;
display:block;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.6;
animation:float 12s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0);
opacity:0;
}
50%{
opacity:0.8;
}
100%{
transform:translateY(-10vh) scale(1);
opacity:0;
}
}

/* RANDOM PARTICLE POSITIONS */

.particles span:nth-child(1){left:10%;animation-delay:0s}
.particles span:nth-child(2){left:20%;animation-delay:2s}
.particles span:nth-child(3){left:30%;animation-delay:4s}
.particles span:nth-child(4){left:40%;animation-delay:1s}
.particles span:nth-child(5){left:60%;animation-delay:3s}
.particles span:nth-child(6){left:70%;animation-delay:5s}
.particles span:nth-child(7){left:80%;animation-delay:2s}
.particles span:nth-child(8){left:90%;animation-delay:4s}

/* MAIN CONTENT */

.container{
width:90%;
max-width:420px;
}

/* LOGO */

.logo{
width:230px;
margin-bottom:10px;
}

/* TITLE */

h1{
font-size:22px;
margin-bottom:25px;
}

/* INPUTS */

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:10px;
background:rgba(0,0,0,0.5);
color:white;
font-size:15px;
outline:none;
}

/* TRANSPARENT BUTTON */

button{
width:100%;
padding:14px;
margin-top:20px;
border:2px solid white;
border-radius:10px;
background:rgba(255,255,255,0.2);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.35);
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="slideshow">
<img src="bg1.jpeg">
<img src="bg2.jpeg">
<img src="bg3.jpeg">
<img src="bg4.jpeg">
<img src="bg5.jpeg">
<img src="bg6.jpeg">
<img src="bg7.jpeg">
</div>

<div class="overlay"></div>

<!-- FLOATING LIGHT PARTICLES -->

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<!-- FORM -->

<div class="container">

<img class="logo" src="logo.jpeg">

<h1>
IMAGIX - The Official Photography Society of KIIT Law School<br>
(Link Repository System)
</h1>

<form id="form">

<input id="name" name="name" placeholder="Name" required>

<input name="roll" placeholder="Roll Number" required>

<input name="event" placeholder="Name of the Event Covered" required>

<input type="url" name="drive" placeholder="Drive Link" required>

<button type="submit">Submit</button>

</form>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwpZ_kF1IJk7w-wMWha8scMP1OpCidOFDNHEHpo6jldT1BBtlZEYELHAloFs9HhY-WSJA/exec"

const form=document.getElementById('form')

form.addEventListener('submit',e=>{
e.preventDefault()

const userName=document.getElementById("name").value

fetch(scriptURL,{
method:'POST',
body:new FormData(form)
})
.then(()=>{
alert("Thank you, "+userName+"! Your response has been submitted.")
form.reset()
})
.catch(()=>{
alert("Submission failed. Please try again.")
})

})

</script>

</body>
</html>
