<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMAGIX Repository</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
width:90%;
max-width:400px;
background:#121212;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(255,255,255,0.05);
}

h1{
text-align:center;
font-size:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#1e1e1e;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>
IMAGIX Official Photography Society<br>
(Link Repository System)
</h1>

<form id="form">

<input name="name" placeholder="Name" required>

<input name="roll" placeholder="Roll Number" required>

<input name="event" placeholder="Event Covered" required>

<input type="url" name="drive" placeholder="Drive Link" required>

<button type="submit">Submit</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbytEtyCcWbNKeTfi5V0-Rda-w2glCF7B3ObGBspT0755Pn1E618U2VXPU5IO1jwXTaNGQ/exec"

const form = document.getElementById('form')

form.addEventListener('submit', e => {
  e.preventDefault()

  fetch(scriptURL, {
    method:'POST',
    body:new FormData(form)
  })
  .then(() => alert("Submitted Successfully"))
  .catch(() => alert("Error"))
})

</script>

</body>
</html>
