<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMAGIX Repository</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
height:100%;
width:100%;
overflow:hidden;
}

/* FULL SCREEN BACKGROUND */

.slideshow{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-3;
}

.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:slide 21s infinite;
}

.slideshow img:nth-child(1){animation-delay:0s;}
.slideshow img:nth-child(2){animation-delay:2s;}
.slideshow img:nth-child(3){animation-delay:4s;}
.slideshow img:nth-child(4){animation-delay:6s;}
.slideshow img:nth-child(5){animation-delay:9s;}
.slideshow img:nth-child(6){animation-delay:12s;}
.slideshow img:nth-child(7){animation-delay:14s;}

@keyframes slide{
0%{opacity:0;}
5%{opacity:1;}
20%{opacity:1;}
25%{opacity:0;}
100%{opacity:0;}
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.45);
z-index:-2;
}

/* FLOATING PARTICLES */

.particles span{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.7;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.particles span:nth-child(1){left:10%;animation-delay:0s;}
.particles span:nth-child(2){left:20%;animation-delay:2s;}
.particles span:nth-child(3){left:30%;animation-delay:4s;}
.particles span:nth-child(4){left:70%;animation-delay:1s;}
.particles span:nth-child(5){left:80%;animation-delay:3s;}
.particles span:nth-child(6){left:90%;animation-delay:5s;}

/* MAIN CONTENT */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:400px;
text-align:center;
color:white;
}

/* LOGO */

.logo{
width:120px;
margin-bottom:15px;
}

/* TITLE */

h1{
font-size:18px;
margin-bottom:25px;
font-weight:600;
letter-spacing:0.5px;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:rgba(0,0,0,0.6);
color:white;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:18px;
border:2px solid white;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.4);
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- BACKGROUND SLIDES -->

<div class="slideshow">

<img src="bg1.jpeg">
<img src="bg2.jpeg">
<img src="bg3.jpeg">
<img src="bg4.jpeg">
<img src="bg5.jpeg">
<img src="bg6.jpeg">
<img src="bg7.jpeg">

</div>

<div class="overlay"></div>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<!-- CONTENT -->

<div class="container">

<img class="logo" src="logo.png">

<h1>
IMAGIX – The Official Photography Society of KIIT Law School<br>
(Link Repository System)
</h1>

<form id="form">

<input id="name" name="name" placeholder="Name" required>

<input name="roll" placeholder="Roll Number" required>

<input name="event" placeholder="Name of the Event Covered" required>

<input type="url" name="drive" placeholder="Drive Link" required>

<button type="submit">Submit</button>

</form>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwpZ_kF1IJk7w-wMWha8scMP1OpCidOFDNHEHpo6jldT1BBtlZEYELHAloFs9HhY-WSJA/exec"

const form=document.getElementById('form')

form.addEventListener('submit',e=>{
e.preventDefault()

const userName=document.getElementById("name").value

fetch(scriptURL,{
method:'POST',
body:new FormData(form)
})
.then(()=>{
alert("Thank you "+userName+"!for your contribution. Your response has been recorded.")
form.reset()
})
.catch(()=>{
alert("Submission failed, please try again.")
})

})

</script>

</body>
</html>
